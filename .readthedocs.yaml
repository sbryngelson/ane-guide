# Read the Docs build for the guide's mdBook web edition.
# RTD has no native mdBook builder, so we run mdBook ourselves via build.commands
# and emit the static site into $READTHEDOCS_OUTPUT/html, which RTD then serves.
# This mirrors web/build-web.sh, adapted for RTD's Linux runner.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"   # web/gen.py (Python standard library only; no requirements)
  commands:
    # Fetch PREBUILT mdBook + mdbook-katex Linux binaries rather than compiling them
    # with cargo (which took minutes per build). mdBook is pinned to 0.4.x and
    # mdbook-katex to the matching 0.9.x line, since the preprocessor speaks the 0.4
    # protocol, not 0.5. No rust toolchain is needed once we skip the compile.
    - mkdir -p "$HOME/bin"
    - curl -fsSL https://github.com/rust-lang/mdBook/releases/download/v0.4.48/mdbook-v0.4.48-x86_64-unknown-linux-gnu.tar.gz | tar xz -C "$HOME/bin" mdbook
    - curl -fsSL https://github.com/lzanini/mdbook-katex/releases/download/0.9.3-binaries/mdbook-katex-v0.9.3-x86_64-unknown-linux-gnu.tar.gz | tar xz -C "$HOME/bin" mdbook-katex
    # Regenerate the mdBook source tree from the authoring chapters (gen.py resolves
    # paths relative to web/, so it must run from there).
    - cd web && python3 gen.py
    # Vendor the mermaid runtime the diagrams render with (book.toml additional-js).
    - curl -fsSL https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js -o web/mermaid.min.js
    # Build the static site straight into RTD's served output directory. PATH is set
    # inline so mdBook is found and can spawn the mdbook-katex preprocessor.
    - PATH="$HOME/bin:$PATH" mdbook build web -d "$READTHEDOCS_OUTPUT/html"
